name: Release

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required to see all existing tags

      - name: Determine version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          git fetch --tags
          LATEST=$(git tag -l "${DATE}.*" | sort -t. -k2 -rn | head -1)
          if [ -z "$LATEST" ]; then
            SUFFIX=0
          else
            SUFFIX=$(( $(echo "$LATEST" | cut -d. -f2) + 1 ))
          fi
          echo "tag=${DATE}.${SUFFIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            goarch: amd64
            artifact: ebpf-net-exporter-linux-amd64
          - runs-on: ubuntu-24.04-arm
            goarch: arm64
            artifact: ebpf-net-exporter-linux-arm64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Install bpftool
        run: |
          # Use a pre-built static binary from the libbpf/bpftool releases.
          # This avoids the fragile linux-tools-$(uname -r) package dance.
          ARCH=$(dpkg --print-architecture)   # amd64 or arm64
          VER=v7.6.0
          URL="https://github.com/libbpf/bpftool/releases/download/${VER}/bpftool-${VER}-${ARCH}.tar.gz"
          curl -sL "$URL" | sudo tar -xzf - -C /usr/local/bin bpftool
          sudo chmod +x /usr/local/bin/bpftool
          bpftool version

      - name: Generate vmlinux.h
        run: |
          echo "=== BTF availability ==="
          ls -la /sys/kernel/btf/vmlinux || echo "BTF file not found!"
          echo "=== Generating vmlinux.h ==="
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
          echo "=== vmlinux.h size ==="
          wc -l bpf/vmlinux.h

      - name: Compile BPF stubs
        run: |
          echo "=== clang version ==="
          clang --version
          echo "=== Compiling BPF C ==="
          GOPACKAGE=main go run github.com/cilium/ebpf/cmd/bpf2go \
            -cc clang \
            -target $(go env GOARCH) \
            -cflags "-O2 -g -Wall -Werror" \
            NetworkTracker bpf/network_tracker.bpf.c

      - name: Build
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${{ needs.version.outputs.tag }}" \
            -o ${{ matrix.artifact }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true  # place all binaries flat in the working directory

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"
          gh release create "${{ needs.version.outputs.tag }}" \
            --prerelease \
            --generate-notes \
            --title "${{ needs.version.outputs.tag }}" \
            ebpf-net-exporter-linux-amd64 \
            ebpf-net-exporter-linux-arm64

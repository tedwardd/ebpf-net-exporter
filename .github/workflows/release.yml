name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required to see all existing tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o ebpf-net-exporter-linux-amd64 .

      - name: Determine version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          # Find the highest numeric suffix already used for today
          LATEST=$(git tag -l "${DATE}.*" | sort -t. -k2 -rn | head -1)
          if [ -z "$LATEST" ]; then
            SUFFIX=0
          else
            SUFFIX=$(( $(echo "$LATEST" | cut -d. -f2) + 1 ))
          fi
          echo "tag=${DATE}.${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --prerelease \
            --generate-notes \
            --title "${{ steps.version.outputs.tag }}" \
            ebpf-net-exporter-linux-amd64
